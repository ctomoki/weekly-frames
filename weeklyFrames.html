<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>週別コマ数グラフ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Meiryo', 'メイリオ', sans-serif; background: #f5f5f5; color: #333; padding: 24px; }
  h1 { font-size: 18px; font-weight: 500; margin-bottom: 16px; color: #444; }
  .card { background: #fff; border-radius: 8px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; font-size: 13px; color: #555; }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .chart-wrap { position: relative; width: 100%; height: 420px; }
</style>
</head>
<body>

<h1>週別コマ数（上映スケジュール）</h1>
<div class="card">
  <div class="legend" id="legend"></div>
  <div class="chart-wrap">
    <canvas id="chart" role="img" aria-label="作品別週別コマ数の積み上げ棒グラフ">作品別週別コマ数を示す積み上げ棒グラフです。</canvas>
  </div>
</div>

<script>
// =============================================
// ★ ここのデータを書き換えてください ★
// start/end は表示用メモ。weeklyFrames は上映開始週から順にコマ数を並べる
// =============================================
const movies = [
  { title: "ドラゴンクエスト　ダイの大冒険",  start: "2025-04-05", end: "2025-05-09",  weeklyFrames: [8, 8, 7, 6, 5] },
  { title: "名探偵コナン　100万ドルの迷宮",   start: "2025-04-12", end: "2025-05-16",  weeklyFrames: [0, 12, 11, 10, 8, 6] },
  { title: "劇場版ハイキュー！！",             start: "2025-04-05", end: "2025-04-25",  weeklyFrames: [5, 5, 4, 2] },
  { title: "SPY×FAMILY劇場版",               start: "2025-04-19", end: "2025-05-09",  weeklyFrames: [0, 0, 9, 8, 7] },
  { title: "ガンダムSEED　FREEDOM",           start: "2025-04-05", end: "2025-05-02",  weeklyFrames: [3, 3, 3, 3] },
];
// =============================================

const palette = ["#3266ad","#e07b39","#5aaa6b","#9b5ec4","#c93f3f","#3ba8c4","#c4a23b","#7b7b7b"];

function getMondayOf(dateStr) {
  const d = new Date(dateStr);
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  d.setHours(0,0,0,0);
  return d;
}
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate()+n); return r; }
function toKey(d) { return d.toISOString().slice(0,10); }

const allWeeks = new Set();
movies.forEach(m => {
  let ws = getMondayOf(m.start);
  m.weeklyFrames.forEach(() => { allWeeks.add(toKey(ws)); ws = addDays(ws, 7); });
});
const weekKeys = Array.from(allWeeks).sort();
const weekLabels = weekKeys.map(k => { const d = new Date(k); return `${d.getMonth()+1}/${d.getDate()}週`; });

const datasets = movies.map((m, idx) => {
  const data = weekKeys.map(wk => {
    let ws = getMondayOf(m.start);
    for (let i = 0; i < m.weeklyFrames.length; i++) {
      if (toKey(ws) === wk) return m.weeklyFrames[i];
      ws = addDays(ws, 7);
    }
    return 0;
  });
  return { label: m.title, data, backgroundColor: palette[idx % palette.length], borderWidth: 0, borderRadius: 2 };
});

const legend = document.getElementById("legend");
datasets.forEach((ds, i) => {
  const el = document.createElement("span");
  el.className = "legend-item";
  el.innerHTML = `<span class="legend-dot" style="background:${palette[i%palette.length]}"></span>${ds.label}`;
  legend.appendChild(el);
});

new Chart(document.getElementById("chart"), {
  type: "bar",
  data: { labels: weekLabels, datasets },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}：${ctx.raw}コマ` } }
    },
    scales: {
      x: { stacked: true, ticks: { autoSkip: false, maxRotation: 0, font: { size: 12 } }, grid: { display: false } },
      y: { stacked: true, beginAtZero: true, title: { display: true, text: "コマ数", font: { size: 12 } }, ticks: { stepSize: 5, font: { size: 12 } }, grid: { color: "rgba(0,0,0,0.06)" } }
    }
  }
});
</script>
</body>
</html>const movies = [
  { title: "作品名", start: "2025-04-05", end: "2025-05-09", weeklyFrames: [8, 8, 7, 6] },
  ...
];
